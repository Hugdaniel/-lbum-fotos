<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="style.css">
<title>📸 Álbum Cumple Minecraft</title>
</head>
<body>

<div class="page">

  <!-- HEADER -->
  <header class="header">
    <span class="header-creeper">🎮</span>
    <h1>ÁLBUM DE FOTOS<br>CUMPLE DE DIEGO</h1>
    <p class="header-sub">¡Todos juntos en el álbum! 📸✨</p>
  </header>

  <div class="divider"></div>

  <!-- UPLOAD -->
  <div class="mc-panel">
    <h2>⬆ SUBIR TU FOTO</h2>

    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*" capture="environment">
      <span class="drop-icon">📷</span>
      <p>Tocá para sacar foto<br>o elegir de galería</p>
      <p class="drop-hint">Se comprime automáticamente 🗜️</p>
    </div>

    <div id="preview-wrap">
      <img id="preview-img" src="" alt="preview">
      <div id="file-info"></div>
    </div>

    <div class="field">
      <label>TU NOMBRE O APODO:</label>
      <input type="text" class="mc-input" id="name-input"
             placeholder="Ej: Steve ⚔️" maxlength="28">
    </div>

    <button class="mc-btn" id="upload-btn" disabled>
      ⬆ SUBIR AL ÁLBUM COMPARTIDO
    </button>

    <div id="progress-wrap">
      <div class="prog-label" id="prog-label">Procesando...</div>
      <div class="prog-outer"><div class="prog-inner" id="prog-bar"></div></div>
    </div>
  </div>

  <!-- ALBUM -->
  <div class="album-top">
    <div>
      <h2>📖 FOTOS DEL CUMPLE</h2>
      <div id="photo-count"></div>
    </div>
    <div class="top-btns">
      <button class="sm-btn refresh" id="refresh-btn">🔄 ACTUALIZAR</button>
      <button class="sm-btn download" id="download-btn" disabled>⬇ DESCARGAR TODO</button>
    </div>
  </div>

  <div id="photo-grid">
    <div id="loading-state"><span class="spinner"></span> Cargando fotos...</div>
  </div>

</div><!-- /page -->

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lb-close">✕ CERRAR</button>
  <img id="lb-img" src="" alt="">
  <div id="lb-info"></div>
  <div id="lb-likes"></div>
</div>

<div id="toast"></div>
<div class="floor-grass"></div>

<script src="/main.js"></script>
</body>
</html>
